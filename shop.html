<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="bw-main.css">
  <title>Coming Soon</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #0f0f0f, #000);
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }

    .banner {
      padding: 2rem 4rem;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      text-align: center;
      color: #fff;
      font-size: 3rem;
      font-weight: 600;
      letter-spacing: 3px;
      animation: fadeIn 2s ease forwards, float 6s ease-in-out infinite;
    }

    /* Typing effect */
    .typing {
      display: inline-block;
      overflow: hidden;
      white-space: nowrap;
      border-right: 3px solid #fff;
      animation: typing 3s steps(12, end), blink 0.7s infinite;
    }

    @keyframes typing {
      from { width: 0 }
      to { width: 100% }
    }

    @keyframes blink {
      50% { border-color: transparent }
    }

    /* Fade in */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Floating animation */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* Extra premium touch: glowing particles */
    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0; left: 0;
      overflow: hidden;
      z-index: -1;
    }

    .particles span {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #fff;
      border-radius: 50%;
      opacity: 0.6;
      animation: sparkle 10s linear infinite;
    }

  <style>
    /* legacy styles cleared — new banner styles are inline below */
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     HEADER
═══════════════════════════════════════════ -->
<header id="bwHeader" role="banner">
  <div class="bw-header-inner">
    <a href="index.html" class="bw-logo"><img src="logo.png" alt="Bemilwis Boutique" width="120" height="46"></a>
    <nav class="bw-nav" aria-label="Main navigation">
      <a href="index.html" class="active">Home</a>
      <a href="shop.html">Our Shop</a>
      <a href="#about">About</a>
      <a href="contact.html">Contact</a>
    </nav>
    <div class="bw-header-actions">
      <button class="bw-cart-btn" onclick="setCartVisible(true)" aria-label="Open cart">
        <img style="width: 24px;" src="online-shopping.png" alt="cart"> <span class="cart-count">0</span>
      </button>
      <button class="bw-btn-outline auth-trigger">Sign In</button>
    </div>
    <button class="bw-hamburger" onclick="sidebarToggle()" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<div class="shop-banner-wrap">
  <!-- Floating particles -->
  <div class="particles" aria-hidden="true">
    <span style="left:5%;  animation-delay:0s;   animation-duration:14s;"></span>
    <span style="left:18%; animation-delay:2s;   animation-duration:11s;"></span>
    <span style="left:32%; animation-delay:4s;   animation-duration:16s;"></span>
    <span style="left:48%; animation-delay:1s;   animation-duration:13s;"></span>
    <span style="left:62%; animation-delay:6s;   animation-duration:10s;"></span>
    <span style="left:76%; animation-delay:3s;   animation-duration:15s;"></span>
    <span style="left:89%; animation-delay:7.5s; animation-duration:12s;"></span>
  </div>

  <div class="shop-banner-bg" aria-hidden="true">
    <!-- Floating orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <!-- Scanline shimmer -->
    <div class="scan-line"></div>
  </div>

  <div class="shop-banner-content">
    <!-- Stacked label -->
    <p class="shop-banner-eyebrow">✦ &nbsp; The Collection &nbsp; ✦</p>

    <!-- Animated word swap -->
    <h1 class="shop-banner-title">
      Something <span class="word-swap" id="wordSwap">Bold</span><br>
      <em>Is Coming</em>
    </h1>

    <p class="shop-banner-sub">Our new season drop is almost here.<br>Premium footwear, curated for the fearless.</p>

    <!-- Countdown -->
    <div class="banner-countdown" id="bannerCountdown">
      <div class="cd-block"><span id="cd-days">00</span><small>Days</small></div>
      <div class="cd-sep">:</div>
      <div class="cd-block"><span id="cd-hours">00</span><small>Hrs</small></div>
      <div class="cd-sep">:</div>
      <div class="cd-block"><span id="cd-mins">00</span><small>Min</small></div>
      <div class="cd-sep">:</div>
      <div class="cd-block"><span id="cd-secs">00</span><small>Sec</small></div>
    </div>

    <!-- Notify CTA -->
    <form class="banner-notify" onsubmit="handleBannerNotify(event)">
      <input type="email" placeholder="Enter your email for early access" required>
      <button type="submit">Notify Me</button>
    </form>

    <p class="banner-small-note">No spam. Unsubscribe anytime.</p>
  </div>

  <style>
    /* ── Shop Banner Overrides ── */
    body {
      margin: 0; min-height: 100vh;
      display: flex; flex-direction: column;
      background: #0a0704;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      overflow-x: hidden;
    }

    /* Push banner below fixed header */
    .shop-banner-wrap {
      position: relative;
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      min-height: calc(100vh - 80px);
      overflow: hidden;
      padding-top: 80px;
    }

    /* ── Background layer ── */
    .shop-banner-bg {
      position: absolute; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, #2a0d17 0%, #0a0704 65%);
    }

    /* Floating glowing orbs */
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(90px); opacity: .55;
      animation: orbFloat 12s ease-in-out infinite;
    }
    .orb-1 {
      width: 520px; height: 520px;
      background: radial-gradient(circle, #b85c6e 0%, transparent 70%);
      top: -120px; left: -100px;
      animation-duration: 14s;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #c49a3c 0%, transparent 70%);
      bottom: -60px; right: -80px;
      animation-duration: 18s; animation-delay: -6s;
    }
    .orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #4a1a2e 0%, transparent 70%);
      top: 40%; left: 55%;
      animation-duration: 10s; animation-delay: -3s;
    }
    @keyframes orbFloat {
      0%, 100% { transform: translate(0,0) scale(1); }
      33%       { transform: translate(30px,-40px) scale(1.07); }
      66%       { transform: translate(-20px, 25px) scale(.95); }
    }

    /* Scan line shimmer */
    .scan-line {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(255,255,255,.012) 3px,
        rgba(255,255,255,.012) 4px
      );
      pointer-events: none;
    }

    /* ── Content ── */
    .shop-banner-content {
      position: relative; z-index: 2;
      text-align: center;
      padding: 40px 24px 80px;
      max-width: 700px;
      animation: bannerFadeUp .9s .2s cubic-bezier(.4,0,.2,1) both;
    }
    @keyframes bannerFadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: none; }
    }

    .shop-banner-eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: .7rem; letter-spacing: .32em;
      text-transform: uppercase;
      color: #c49a3c;
      margin-bottom: 24px;
      animation: bannerFadeUp .7s .35s both;
    }

    .shop-banner-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(3.2rem, 10vw, 7rem);
      font-weight: 300; line-height: .95;
      color: #fffdf8;
      margin-bottom: 22px;
    }
    .shop-banner-title em {
      display: block;
      color: #b85c6e; font-style: italic;
    }

    /* Word swap animation */
    .word-swap {
      display: inline-block;
      color: #c49a3c;
      position: relative;
      animation: wordPulse 3s ease-in-out infinite;
    }
    @keyframes wordPulse {
      0%, 100% { opacity: 1; transform: none; }
      45%       { opacity: 0; transform: translateY(-12px); }
      55%       { opacity: 0; transform: translateY(12px); }
    }

    .shop-banner-sub {
      color: rgba(255,253,248,.55);
      font-size: clamp(.9rem, 2vw, 1.1rem);
      line-height: 1.65;
      margin-bottom: 44px;
    }

    /* ── Countdown ── */
    .banner-countdown {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; margin-bottom: 40px;
      flex-wrap: wrap;
    }
    .cd-block {
      display: flex; flex-direction: column; align-items: center;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 12px;
      padding: 16px 22px; min-width: 74px;
      backdrop-filter: blur(6px);
    }
    .cd-block span {
      font-family: 'Space Mono', monospace;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700; color: #fffdf8;
      line-height: 1;
    }
    .cd-block small {
      font-size: .62rem; letter-spacing: .2em; text-transform: uppercase;
      color: rgba(255,253,248,.45); margin-top: 6px;
    }
    .cd-sep {
      font-family: 'Space Mono', monospace;
      font-size: 2rem; color: #b85c6e;
      line-height: 1; margin-top: -12px;
      animation: sepBlink .9s step-end infinite;
    }
    @keyframes sepBlink { 50% { opacity: 0; } }

    /* ── Notify form ── */
    .banner-notify {
      display: flex; gap: 0;
      max-width: 480px; margin: 0 auto 14px;
      border-radius: 50px;
      overflow: hidden;
      border: 1.5px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.06);
      backdrop-filter: blur(8px);
    }
    .banner-notify input {
      flex: 1; background: transparent; border: none; outline: none;
      padding: 14px 22px;
      color: #fffdf8; font-family: 'Space Grotesk', sans-serif;
      font-size: .9rem;
    }
    .banner-notify input::placeholder { color: rgba(255,253,248,.35); }
    .banner-notify button {
      padding: 14px 28px; border: none; cursor: pointer;
      background: #b85c6e; color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: .85rem;
      letter-spacing: .04em;
      border-radius: 0 50px 50px 0;
      transition: background .18s;
      white-space: nowrap;
    }
    .banner-notify button:hover { background: #8f3f52; }

    .banner-small-note {
      font-size: .72rem; color: rgba(255,253,248,.3);
      letter-spacing: .04em;
    }

    /* Floating particles (keep original) */
    .particles { z-index: 1; }
    .particles span {
      position: absolute; width: 3px; height: 3px;
      background: rgba(255,255,255,.7); border-radius: 50%;
      animation: sparkle 12s linear infinite;
    }
    @keyframes sparkle {
      from { transform: translateY(100vh) scale(1); opacity: .7; }
      to   { transform: translateY(-10vh) scale(0.3); opacity: 0; }
    }
  </style>

  <script>
    // Word swap cycle
    const words = ['Bold','Fierce','Stunning','Iconic','Yours'];
    let wi = 0;
    setInterval(() => {
      wi = (wi + 1) % words.length;
      document.getElementById('wordSwap').textContent = words[wi];
    }, 3000);

    // Countdown — target 30 days from now
    const target = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000);
    function tick() {
      const diff = target - Date.now();
      if (diff <= 0) return;
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      document.getElementById('cd-days').textContent  = String(d).padStart(2,'0');
      document.getElementById('cd-hours').textContent = String(h).padStart(2,'0');
      document.getElementById('cd-mins').textContent  = String(m).padStart(2,'0');
      document.getElementById('cd-secs').textContent  = String(s).padStart(2,'0');
    }
    tick(); setInterval(tick, 1000);

    function handleBannerNotify(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.textContent = '✓ You\'re on the list!';
      btn.style.background = '#2e7d32';
      e.target.querySelector('input').value = '';
      setTimeout(() => { btn.textContent = 'Notify Me'; btn.style.background = ''; }, 4000);
    }
  </script>
</div><!-- /.shop-banner-wrap -->
</body>
</html>
